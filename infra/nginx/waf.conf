# Web Application Firewall Configuration

# Prevent SQL Injection
secure_sql_injections;

# Block XSS
set $block_xss 0;
if ($query_string ~* '(union.*select|select.*from|insert.*into|drop.*table|--|#)') {
    set $block_xss 1;
}
if ($block_xss) {
    return 403;
}

# Bot Protection
if ($http_user_agent ~* '(bot|crawl|slurp|spider|checker)') {
    return 403;
}

# Payload Filtering
set $restricted_payload 0;
if ($request_uri ~* '(\.(php|asp|jsp|exe|pl|py|sh|cgi|cer|bat)\?|--|;|\{|\}|<|>|\[|\]|\\|"|\'|\`|\()') {
    set $restricted_payload 1;
}
if ($restricted_payload) {
    return 403;
}

# Logging and Monitoring
log_format custom_log '$remote_addr - $remote_user [$time_local] "$request" $status $body_bytes_sent "$http_referer" "$http_user_agent"';
access_log /var/log/nginx/waf_access.log custom_log;