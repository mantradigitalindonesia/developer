# SSL/TLS Configuration for NGINX

# Enable TLS 1.3
ssl_protocols TLSv1.3;  

# Specify cipher suites for modern security
ssl_ciphers 'TLS_AES_128_GCM_SHA256:TLS_AES_256_GCM_SHA384:TLS_CHACHA20_POLY1305';

# Enable HTTP Strict Transport Security (HSTS) for one year
add_header Strict-Transport-Security 'max-age=31536000; includeSubDomains; preload';

# Redirect HTTP to HTTPS
server {
    listen 80;
    server_name your_domain.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name your_domain.com;

    ssl_certificate /path/to/your/fullchain.pem;
    ssl_certificate_key /path/to/your/privkey.pem;

    # Enable HSTS
    add_header Strict-Transport-Security 'max-age=31536000; includeSubDomains; preload';

    # Other configurations...
}